<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#050508"/>

  <!-- Ambient glow -->
  <circle cx="16" cy="16" r="14" fill="url(#glow)"/>

  <!-- Grid lines — horizontal -->
  <line x1="7"  y1="11" x2="25" y2="11" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="0.6"/>
  <line x1="7"  y1="16" x2="25" y2="16" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="0.6"/>
  <line x1="7"  y1="21" x2="25" y2="21" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="0.6"/>

  <!-- Grid lines — vertical -->
  <line x1="11" y1="7" x2="11" y2="25" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="0.6"/>
  <line x1="16" y1="7" x2="16" y2="25" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="0.6"/>
  <line x1="21" y1="7" x2="21" y2="25" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="0.6"/>

  <!-- Connection edges -->
  <line x1="11" y1="11" x2="21" y2="11" stroke="url(#nodeGrad)" stroke-opacity="0.6" stroke-width="1"/>
  <line x1="11" y1="11" x2="11" y2="21" stroke="url(#nodeGrad)" stroke-opacity="0.6" stroke-width="1"/>
  <line x1="11" y1="21" x2="21" y2="21" stroke="url(#nodeGrad)" stroke-opacity="0.6" stroke-width="1"/>
  <line x1="21" y1="11" x2="21" y2="21" stroke="url(#nodeGrad)" stroke-opacity="0.6" stroke-width="1"/>
  <line x1="11" y1="11" x2="21" y2="21" stroke="url(#nodeGrad)" stroke-opacity="0.35" stroke-width="0.8"/>
  <line x1="21" y1="11" x2="11" y2="21" stroke="url(#nodeGrad)" stroke-opacity="0.35" stroke-width="0.8"/>

  <!-- Corner nodes -->
  <circle cx="11" cy="11" r="2.2" fill="url(#nodeGrad)" opacity="0.9"/>
  <circle cx="21" cy="11" r="2.2" fill="url(#nodeGrad)" opacity="0.9"/>
  <circle cx="11" cy="21" r="2.2" fill="url(#nodeGrad)" opacity="0.9"/>
  <circle cx="21" cy="21" r="2.2" fill="url(#nodeGrad)" opacity="0.9"/>

  <!-- Central hub node — brightest -->
  <circle cx="16" cy="16" r="3" fill="url(#nodeGrad)"/>
  <circle cx="16" cy="16" r="1.5" fill="#ffffff" opacity="0.9"/>
</svg>
